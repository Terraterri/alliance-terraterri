name: PR Validation

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Lint & Build Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Lint Code
        run: npm run lint

      - name: Test Docker Build
        run: docker build -t alliance-terraterri:test .
